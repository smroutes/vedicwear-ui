<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VedicWear — Divine Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Left content ── */
    .content {
      padding: 0 6vw;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      max-width: 44%;
    }

    .logo {
      width: clamp(180px, 22vw, 300px);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #ccc;
    }

    .tagline {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.82rem, 1.1vw, 0.98rem);
      font-weight: 300;
      color: #888;
      line-height: 1.9;
      max-width: 300px;
    }

    .stat {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #bbb;
    }

    /* ── Right deity image ── */
    .deity-wrap {
      width: 56%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .deity-img {
      height: 94vh;
      width: auto;
      object-fit: contain;
      object-position: bottom;
    }
  </style>
</head>
<body>

  <div class="scene">

    <div class="content">
      <img class="logo" src="logo.svg" alt="VedicWear" />
      <div class="divider"></div>
      <p class="tagline">
        Premium god-printed garments crafted with devotion — wear the divine energy of Hindu deities every day.
      </p>
      <span class="stat">100% Pure Cotton</span>
    </div>

    <div class="deity-wrap">
      <img class="deity-img" src="shiva.jpg" alt="Lord Shiva" />
    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VedicWear — Divine Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #fff;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 42% 58%;
    }

    /* ── Left panel ── */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 5vw 0 6vw;
      gap: 0;
      position: relative;
      background: #fff;
      z-index: 2;
    }

    .eyebrow {
      font-family: 'Raleway', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c07a20;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .logo-wrap {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
      margin-bottom: 2.2rem;
    }

    .logo-wrap img {
      width: clamp(160px, 19vw, 260px);
    }

    .rule {
      width: 36px;
      height: 1px;
      background: #d4a050;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 1.5vw, 1.3rem);
      font-weight: 300;
      color: #5a4a3a;
      line-height: 1.85;
      max-width: 280px;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.55s;
    }

    .detail {
      font-family: 'Raleway', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #bbb;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    /* bottom-left corner mark */
    .corner-mark {
      position: absolute;
      bottom: 2.5rem;
      left: 6vw;
      font-family: 'Raleway', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ddd;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
    }

    /* ── Right panel ── */
    .right {
      position: relative;
      background: #f5ebe0;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* OM watermark */
    .right::before {
      content: 'ॐ';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      font-size: clamp(16rem, 26vw, 28rem);
      font-family: serif;
      color: rgba(180,120,40,0.07);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .deity-img {
      position: relative;
      z-index: 1;
      height: 97vh;
      width: auto;
      object-fit: contain;
      object-position: bottom;
      mix-blend-mode: multiply;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.4s;
    }

    /* top-right label */
    .panel-label {
      position: absolute;
      top: 2.8rem;
      right: 2.5rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(160,100,30,0.45);
      writing-mode: vertical-rl;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1s;
    }

    /* ── Thin amber divider line ── */
    .divider-line {
      position: absolute;
      left: 42%;
      top: 12%;
      height: 76%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, #d4a05088, transparent);
      z-index: 3;
      pointer-events: none;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="scene">

    <div class="left">
      <span class="eyebrow">ॐ &nbsp; Sacred Apparel</span>

      <div class="logo-wrap">
        <img src="logo.svg" alt="VedicWear" />
      </div>

      <div class="rule"></div>

      <p class="tagline">
        God-printed garments crafted with devotion — wear the divine every day.
      </p>

      <span class="detail">100% Pure Cotton &nbsp;·&nbsp; Handcrafted</span>

      <span class="corner-mark">Est. 2026 &nbsp;·&nbsp; India</span>
    </div>

    <div class="right">
      <span class="panel-label">Mahadeva &nbsp;·&nbsp; The Great God</span>
      <img class="deity-img" src="shiva.jpg" alt="Lord Shiva" />
    </div>

  </div>

  <div class="divider-line"></div>

</body>
</html>
